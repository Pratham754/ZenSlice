<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenSlice - Digital Wellbeing for PC</title>
    <style>
        /* Basic reset for the loading screen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            overflow: hidden;
        }

        #root {
            width: 100%;
            height: 100vh;
            overflow: auto;
        }

        /* Loading screen styles */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #64748b;
            font-size: 18px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="padding: 2rem; text-align: center; font-family: sans-serif;">
            <h2>JavaScript Required</h2>
            <p>You need to enable JavaScript to run ZenSlice.</p>
        </div>
    </noscript>

    <div id="loading" class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading ZenSlice...</div>
    </div>

    <div id="root" style="display: none"></div>
</body>
</html>
