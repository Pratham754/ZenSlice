<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenSlice - Digital Wellbeing for PC</title>
    <style>
      /* Preload font to avoid FOUT (Flash of Unstyled Text) */
      @font-face {
        font-family: "Pineapple Grass";
        src: url("./fonts/Pineapple_Grass.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Basic reset and styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
          "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8fafc;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100vh;
        overflow: auto;
      }

      /* Loading screen styles */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        gap: 20px;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top: 4px solid #60a5fa;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-family: "Pineapple Grass", "Montserrat", "Poppins", sans-serif;
        color: #64748b;
        font-size: 18px;
      }

      /* Error boundary styles */
      .error-boundary {
        padding: 2rem;
        text-align: center;
        font-family: Arial, sans-serif;
        background: #fef2f2;
        color: #dc2626;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .error-boundary h2 {
        margin-bottom: 1rem;
        font-size: 24px;
      }

      .error-boundary p {
        margin-bottom: 1.5rem;
        font-size: 16px;
      }

      .error-boundary details {
        background: white;
        padding: 1rem;
        border-radius: 8px;
        margin-top: 1rem;
        max-width: 600px;
        text-align: left;
        font-family: monospace;
        font-size: 12px;
        max-height: 200px;
        overflow: auto;
      }
      /* Hide scrollbar but keep scroll functionality */
      ::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Edge */
      }

      body {
        -ms-overflow-style: none; /* IE, Edge */
        scrollbar-width: none; /* Firefox */
      }
    </style>
  </head>
  <body>
    <noscript>
      <div
        style="
          padding: 2rem;
          text-align: center;
          font-family: Arial, sans-serif;
        "
      >
        <h2>JavaScript Required</h2>
        <p>You need to enable JavaScript to run ZenSlice.</p>
      </div>
    </noscript>

    <!-- Loading screen (shown until React loads) -->
    <div id="loading" class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading ZenSlice...</div>
    </div>

    <!-- React app will mount here -->
    <div id="root" style="display: none"></div>

    <script>
      // Hide loading screen when React app mounts
      window.addEventListener("load", function () {
        // React will show the root div when it's ready
        const root = document.getElementById("root");
        const loading = document.getElementById("loading");

        // If React takes more than 3 seconds to load, show an error
      });

      // Basic error handling for uncaught errors
      window.addEventListener("error", function (e) {
        console.error("Uncaught error:", e.error);
      });

      window.addEventListener("unhandledrejection", function (e) {
        console.error("Unhandled promise rejection:", e.reason);
      });

      window.addEventListener("DOMContentLoaded", () => {
        const style = document.createElement("style");
        style.innerHTML = `
    * {
      user-select: none !important;
      -webkit-user-select: none !important;
    }
  `;
        document.head.appendChild(style);
      });
    </script>
  </body>
</html>
